    severity: medium
    description: "Agent 生命周期中横切关注点的可组合中间件解耦"
    tags: ["lifecycle-hooks", "composable", "aop", "plugin"]

  - id: "PD-11"
    slug: "observability"
    title: "可观测性"
    subtitle: "Observability & Cost Tracking"
    icon: "activity"
    color: "#14b8a6"  # teal
    severity: high
    description: "LLM 调用链路追踪、Token 计量、成本分析、结构化日志"
